<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="main.css">
    <script src="/main.js" defer></script>
    <title>Document</title>
</head>

<body>
    <main>
        <section id='droparea' class="droparea ">
            <i class="far fa-images"></i>
            <p>Arrastra tu archivo .log aqui!</p>
        </section>
        <section id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p>Procesando archivo...</p>
        </section>
        <section id="menu" class="menu ">
            <h2>Menú</h2>
            <button id="btnFrecuencia">Consultar frecuencia</button>
            <button id="btnTop">Top 5</button>
            <button id="btnReporte">Generar reporte</button>
            <pre id="salida"></pre>
        </section>
        <section id="top5Box" class="hidden">
            <h2>Top 5 de incidentes</h2>
            <ul id="top5List"></ul>
        </section>
    </main>
</body>

</html>
